<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temperature & Wind Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass:      rgba(8, 14, 22, 0.60);
      --glass-lite: rgba(8, 14, 22, 0.38);
      --border:     rgba(160,200,240, 0.20);
      --border-hi:  rgba(160,200,240, 0.42);
      --text:       #ddeaf8;
      --muted:      rgba(200,220,245,0.55);
      --accent-r:   #f07040;
      --accent-b:   #7ab8f5;
      --radius-sm:  6px;
      --radius-md:  10px;
      --radius-lg:  13px;
    }

    html, body {
      height: 100%; overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
    }

    /* ── Background ── */
    #bg {
      position: fixed; inset: 0; z-index: 0;
      background: #0d1824 center/cover no-repeat;
    }
    #bg-overlay {
      position: fixed; inset: 0; z-index: 1;
      background: linear-gradient(180deg, rgba(4,10,20,.35) 0%, rgba(8,18,32,.22) 45%, rgba(4,10,20,.50) 100%);
    }

    /* ── Wrapper: full-viewport flex column ── */
    #app {
      position: relative; z-index: 2;
      height: 100vh; width: 100vw;
      display: flex; flex-direction: column;
      padding: 14px 18px 12px;
      gap: 10px;
    }

    /* ── Page header ── */
    .page-header {
      display: flex; flex-direction: column; gap: 5px; flex-shrink: 0;
    }
    .page-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
      color: #ff9070; text-shadow: 0 1px 8px rgba(0,0,0,.85);
    }
    .page-title { font-size: 18px; font-weight: 700; line-height: 1.25; text-shadow: 0 1px 8px rgba(0,0,0,.9); color: #ffffff; }
    .page-sub   { font-size: 12px; font-weight: 600; color: #ffffff; line-height: 1.5; text-shadow: 0 1px 6px rgba(0,0,0,.8); }

    /* ── Body row ── */
    .body-row {
      flex: 1; min-height: 0;
      display: grid; grid-template-columns: 200px 1fr; gap: 12px;
    }

    /* ── Sidebar ── */
    .sidebar {
      display: flex; flex-direction: column; gap: 8px;
      min-height: 0; overflow: hidden;
    }

    .panel {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 11px 12px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      flex-shrink: 0;
    }
    .panel-label {
      font-size: 9px; font-weight: 600; letter-spacing: .12em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }

    /* country toggle */
    .toggle-row { display: flex; gap: 5px; }
    .toggle-btn {
      flex: 1; padding: 6px 4px;
      font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: transparent; color: var(--muted); cursor: pointer;
      transition: all .14s;
    }
    .toggle-btn.on {
      background: rgba(100,170,240,.22);
      border-color: var(--accent-b); color: #b8d8f8;
    }
    .toggle-btn:hover:not(.on) { border-color: var(--border-hi); color: var(--text); }

    /* chips */
    .chip-list { display: flex; flex-direction: column; gap: 3px; }
    .chip {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 8px; border-radius: var(--radius-sm);
      border: 1px solid transparent; cursor: pointer;
      font-size: 11px; font-weight: 500;
      transition: background .12s, border-color .12s;
      user-select: none; color: var(--text);
    }
    .chip:hover   { background: rgba(160,200,240,.08); border-color: var(--border); }
    .chip.off     { opacity: .38; }
    .chip-dot     { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .chip-check   {
      width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0;
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      transition: all .12s;
    }
    .chip.on .chip-check { border-color: transparent; }
    .chip-check svg { opacity: 0; transition: opacity .1s; }
    .chip.on .chip-check svg { opacity: 1; }

    /* action buttons */
    .act-btn {
      width: 100%; padding: 7px; font-family: 'Inter', sans-serif;
      font-size: 11px; font-weight: 500;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: transparent; color: var(--text); cursor: pointer;
      transition: all .13s; margin-bottom: 5px;
    }
    .act-btn:last-child { margin-bottom: 0; }
    .act-btn:hover { background: rgba(100,170,240,.20); border-color: var(--accent-b); color: #b8d8f8; }

    /* stats */
    .stat-list { display: flex; flex-direction: column; }
    .stat-row  {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 10px;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: var(--muted); }
    .stat-val   { font-family: 'JetBrains Mono', monospace; font-weight: 500; color: var(--text); }

    /* ── Chart panel ── */
    .chart-panel {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 18px 12px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex; flex-direction: column; gap: 6px;
      min-height: 0;
    }



    /* legend */
    .legend {
      display: flex; flex-wrap: wrap; gap: 10px;
      padding: 7px 11px;
      background: rgba(0,0,0,.22);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .legend-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 500; cursor: pointer;
      transition: opacity .12s; color: var(--text);
    }
    .legend-item.off { opacity: .3; text-decoration: line-through; }
    .legend-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

    /* svg */
    .chart-svg-wrap { flex: 1; min-height: 0; position: relative; }
    #chart-svg { width: 100%; height: 100%; display: block; overflow: visible; }

    /* footer */
    .chart-footer {
      display: flex; gap: 18px; flex-wrap: wrap; flex-shrink: 0;
      padding-top: 7px; border-top: 1px solid var(--border);
    }
    .cstat { display: flex; gap: 4px; align-items: center; font-size: 10px; }
    .cstat-l { color: var(--muted); }
    .cstat-v { font-family: 'JetBrains Mono', monospace; font-weight: 500; }

    /* tooltip */
    #tooltip {
      position: fixed; pointer-events: none; z-index: 9999;
      background: rgba(6,12,22,.96);
      border: 1px solid rgba(120,180,240,.45);
      color: #ddeaf8;
      border-radius: var(--radius-md); padding: 11px 14px;
      font-size: 12px; line-height: 1.65; opacity: 0; visibility: hidden;
      transition: opacity .12s; width: 200px;
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
    }
    #tooltip strong { font-family: 'JetBrains Mono', monospace; font-size: 13px; display: block; margin-bottom: 5px; color: #ffffff; }
    .tt-row { display: flex; justify-content: space-between; gap: 14px; color: #c8ddf0; }
    .tt-row span:last-child { font-family: 'JetBrains Mono', monospace; font-weight: 500; color: #ffffff; }
    .tt-swatch { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 5px; vertical-align: middle; }
    .tt-divider { border-top: 1px solid rgba(255,255,255,.15); margin: 5px 0; }

    /* D3 styles */
    .tick text    { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #c8ddf0; }
    .domain       { stroke: rgba(160,200,240,.25); }
    .grid line    { stroke: rgba(160,200,240,.18); stroke-dasharray: 3 3; }
    .grid .domain { stroke: none; }
    .axis-lbl     { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500; fill: #a8c8e8; }
    .bar-cap      { pointer-events: none; }
    .bar-total    { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; pointer-events: none; fill: #ffffff; }
    .seg-lbl      { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; pointer-events: none; fill: #ffffff; }
    .ann-line     { stroke: #f07040; stroke-width: 1.5; stroke-dasharray: 4 3; }
    .ann-bg       { fill: rgba(240,112,64,.25); stroke: #f07040; stroke-width: 1; }
    .ann-txt      { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; fill: #ffc4a8; }
    .who-line     { stroke: var(--accent-b); stroke-width: 1.5; stroke-dasharray: 6 4; }
    .who-bg       { fill: rgba(122,184,245,.20); }
    .who-txt      { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; font-weight: 500; fill: #a8d8f8; }


    /* ── Year panel ── */
    .yr-range {
      width: 100%; accent-color: var(--accent-b); cursor: pointer;
      margin: 4px 0;
    }
    .yr-val {
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px; font-weight: 700; color: #ffffff;
      letter-spacing: .06em; margin: 3px 0 6px;
    }
    .yr-btns { display: flex; gap: 4px; }
    .yr-btn {
      flex: 1; padding: 4px 2px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; font-weight: 600;
      border-radius: var(--radius-sm); cursor: pointer;
      border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      transition: all .13s;
    }
    .yr-btn.on {
      background: rgba(100,170,240,.22);
      border-color: var(--accent-b); color: #b8d8f8;
    }
    .yr-btn:hover:not(.on) { border-color: var(--border-hi); color: var(--text); }
    .bar-segment  { cursor: pointer; transition: filter .12s; }
    .bar-segment:hover { filter: brightness(1.15); }

    .home-btn {
      width: 100%;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background: var(--glass);
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.01em;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: background .15s ease, border-color .15s ease, color .15s ease, box-shadow .15s ease;
    }

    .home-btn:hover {
      background: rgba(100, 170, 240, 0.16);
      border-color: var(--border-hi);
      color: var(--text);
      box-shadow: 0 0 0 1px rgba(122, 184, 245, 0.14), 0 6px 18px rgba(4, 12, 24, 0.35);
    }

    .home-btn-icon {
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      color: #b8d8f8;
    }

    .home-btn-text {
      line-height: 1.1;
    }
  </style>
</head>

      <div class="panel">
        <div class="panel-label">Summary</div>
        <div class="stat-list" id="stat-list"></div>
      </div>

    </aside>

    <!-- chart -->
    <main class="chart-panel">
  <h1 class="page-title" id="page-title" style="text-align:center;">
    Seasonal Variation of Particulate Matter (PM₁₀) Concentrations — USA
  </h1>
  <div class="legend" id="legend"></div>
      <div class="chart-svg-wrap">
        <svg id="chart-svg"></svg>
        <div id="tooltip"></div>
      </div>
      <div class="chart-footer" id="chart-footer"></div>
    </main>

  </div>
</div>

<script>
const CATS = [
  { key:'dust',     label:'Dust',          color:'#E8724A' },
  { key:'smoke',    label:'Smoke',         color:'#6aaee8' },
  { key:'mold',     label:'Mold & pollen', color:'#3db88a' },
  { key:'chemical', label:'Chemical',      color:'#8B5CF6' },
];
const DATA = {
  USA: {
    2020: [
      { season:'Spring', dust:9,  smoke:6,  mold:13, chemical:5  },
      { season:'Summer', dust:11, smoke:8,  mold:4,  chemical:6  },
      { season:'Winter', dust:10, smoke:6,  mold:4,  chemical:9  },
      { season:'Fall',   dust:9,  smoke:7,  mold:3,  chemical:5  },
    ],
    2021: [
      { season:'Spring', dust:8,  smoke:5,  mold:12, chemical:4  },
      { season:'Summer', dust:10, smoke:7,  mold:3,  chemical:5  },
      { season:'Winter', dust:9,  smoke:5,  mold:3,  chemical:8  },
      { season:'Fall',   dust:8,  smoke:6,  mold:2,  chemical:4  },
    ],
    2022: [
      { season:'Spring', dust:7,  smoke:5,  mold:11, chemical:4  },
      { season:'Summer', dust:9,  smoke:6,  mold:3,  chemical:5  },
      { season:'Winter', dust:8,  smoke:4,  mold:2,  chemical:7  },
      { season:'Fall',   dust:7,  smoke:5,  mold:2,  chemical:4  },
    ],
    2023: [
      { season:'Spring', dust:8,  smoke:6,  mold:12, chemical:5  },
      { season:'Summer', dust:11, smoke:7,  mold:4,  chemical:5  },
      { season:'Winter', dust:9,  smoke:6,  mold:3,  chemical:8  },
      { season:'Fall',   dust:8,  smoke:6,  mold:2,  chemical:5  },
    ],
    2024: [
      { season:'Spring', dust:7,  smoke:5,  mold:11, chemical:4  },
      { season:'Summer', dust:9,  smoke:7,  mold:3,  chemical:4  },
      { season:'Winter', dust:8,  smoke:5,  mold:2,  chemical:7  },
      { season:'Fall',   dust:7,  smoke:5,  mold:2,  chemical:4  },
    ],
  },
  India: {
    2020: [
      { season:'Winter',       dust:295, smoke:235, mold:55, chemical:140 },
      { season:'Post-monsoon', dust:235, smoke:192, mold:44, chemical:98  },
      { season:'Summer',       dust:95,  smoke:55,  mold:12, chemical:33  },
      { season:'Monsoon',      dust:33,  smoke:28,  mold:11, chemical:22  },
    ],
    2021: [
      { season:'Winter',       dust:280, smoke:220, mold:50, chemical:130 },
      { season:'Post-monsoon', dust:220, smoke:180, mold:40, chemical:90  },
      { season:'Summer',       dust:90,  smoke:50,  mold:10, chemical:30  },
      { season:'Monsoon',      dust:30,  smoke:25,  mold:10, chemical:20  },
    ],
    2022: [
      { season:'Winter',       dust:265, smoke:208, mold:47, chemical:122 },
      { season:'Post-monsoon', dust:208, smoke:170, mold:37, chemical:84  },
      { season:'Summer',       dust:84,  smoke:46,  mold:9,  chemical:27  },
      { season:'Monsoon',      dust:27,  smoke:22,  mold:9,  chemical:18  },
    ],
    2023: [
      { season:'Winter',       dust:272, smoke:214, mold:49, chemical:125 },
      { season:'Post-monsoon', dust:215, smoke:175, mold:38, chemical:87  },
      { season:'Summer',       dust:87,  smoke:48,  mold:10, chemical:28  },
      { season:'Monsoon',      dust:28,  smoke:23,  mold:9,  chemical:19  },
    ],
    2024: [
      { season:'Winter',       dust:258, smoke:200, mold:45, chemical:118 },
      { season:'Post-monsoon', dust:200, smoke:162, mold:35, chemical:80  },
      { season:'Summer',       dust:80,  smoke:44,  mold:8,  chemical:25  },
      { season:'Monsoon',      dust:25,  smoke:20,  mold:8,  chemical:17  },
    ],
  },
};
const YEARS = [2020, 2021, 2022, 2023, 2024];

let country = 'USA';
let selectedYear = 2024;
let visible = new Set(CATS.map(c => c.key));

function setCountry(c) {
  country = c;
  document.getElementById('btn-usa').classList.toggle('on',   c==='USA');
  document.getElementById('btn-india').classList.toggle('on', c==='India');
  document.getElementById('page-title').innerHTML = 'Seasonal Variation of Particulate Matter (PM₁₀) Concentrations — ' + c + ' (' + selectedYear + ')';
  render();
}
function selectAll()  { visible = new Set(CATS.map(c=>c.key)); buildYearPanel(); buildChips(); buildLegend(); render(); }
function resetAll() {
  selectedYear = 2024;
  visible = new Set(CATS.map(c=>c.key));
  setCountry('USA');
  buildChips();
  buildLegend();
  buildYearPanel();
}

function toggle(key) {
  if (visible.has(key)) { if (visible.size > 1) visible.delete(key); }
  else visible.add(key);
  buildYearPanel(); buildChips(); buildLegend(); render();
}

function buildYearPanel() {
  const el = document.getElementById('year-panel');
  el.innerHTML = `
    <div class="panel-label">Year</div>
    <div style="display:flex;align-items:center;gap:6px;">
      <span style="font-size:10px;color:var(--muted)">2020</span>
      <input type="range" class="yr-range" id="yr-slider" min="2020" max="2024" step="1"
        value="${selectedYear}" oninput="setYear(+this.value)">
      <span style="font-size:10px;color:var(--muted)">2024</span>
    </div>
    <div class="yr-val" id="yr-display">${selectedYear}</div>
    <div class="yr-btns">
      ${YEARS.map(y => `<button class="yr-btn ${y===selectedYear?'on':''}" id="yr-${y}" onclick="setYear(${y})">${y}</button>`).join('')}
    </div>`;
}

function setYear(y) {
  selectedYear = y;
  const slider = document.getElementById('yr-slider');
  if (slider) slider.value = y;
  const disp = document.getElementById('yr-display');
  if (disp) disp.textContent = y;
  YEARS.forEach(yr => {
    const b = document.getElementById('yr-' + yr);
    if (b) b.className = 'yr-btn' + (yr === y ? ' on' : '');
  });
  // update page title
  document.getElementById('page-title').innerHTML =
    'Seasonal Variation of Particulate Matter (PM₁₀) Concentrations — ' + country + ' (' + y + ')';
  render();
}

function buildChips() {
  const el = document.getElementById('chip-list');
  el.innerHTML = '';
  CATS.forEach(cat => {
    const on = visible.has(cat.key);
    const div = document.createElement('div');
    div.className = 'chip ' + (on ? 'on' : 'off');
    div.innerHTML = `
      <span class="chip-check" style="background:${on ? cat.color : 'transparent'}">
        <svg width="8" height="6" viewBox="0 0 9 7" fill="none">
          <path d="M1 3.5L3.5 6L8 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="chip-dot" style="background:${cat.color}"></span>
      <span>${cat.label}</span>`;
    div.addEventListener('click', () => toggle(cat.key));
    el.appendChild(div);
  });
}

function buildLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = '';
  CATS.forEach(cat => {
    const on = visible.has(cat.key);
    const item = document.createElement('div');
    item.className = 'legend-item ' + (on ? '' : 'off');
    item.innerHTML = `<span class="legend-dot" style="background:${cat.color}"></span>${cat.label}`;
    item.addEventListener('click', () => toggle(cat.key));
    el.appendChild(item);
  });
}

function updateStats(rows, totals) {
  const max  = Math.max(...totals);
  const min  = Math.min(...totals);
  const avg  = Math.round(totals.reduce((a,b)=>a+b,0)/totals.length);
  const peak = rows[totals.indexOf(max)].season;
  document.getElementById('stat-list').innerHTML = `
    <div class="stat-row"><span class="stat-label">Country</span>     <span class="stat-val">${country}</span></div>
    <div class="stat-row"><span class="stat-label">Year</span>        <span class="stat-val">${selectedYear}</span></div>
    <div class="stat-row"><span class="stat-label">Peak season</span> <span class="stat-val">${peak}</span></div>
    <div class="stat-row"><span class="stat-label">Max PM10</span>    <span class="stat-val">${max} µg</span></div>
    <div class="stat-row"><span class="stat-label">Min PM10</span>    <span class="stat-val">${min} µg</span></div>
    <div class="stat-row"><span class="stat-label">Avg PM10</span>    <span class="stat-val">${avg} µg</span></div>`;
  document.getElementById('chart-footer').innerHTML = `
    <div class="cstat"><span class="cstat-l">Categories:</span>  <span class="cstat-v">${visible.size} / ${CATS.length}</span></div>
    <div class="cstat"><span class="cstat-l">Peak total:</span>  <span class="cstat-v">${max} µg/m³</span></div>
    <div class="cstat"><span class="cstat-l">Season avg:</span>  <span class="cstat-v">${avg} µg/m³</span></div>
    <div class="cstat"><span class="cstat-l">Top season:</span>  <span class="cstat-v">${peak}</span></div>`;
}

const ttEl = document.getElementById('tooltip');
function showTT(ev, html) {
  /* render content off-screen first so we can measure real dimensions */
  ttEl.innerHTML = html;
  ttEl.style.visibility = 'hidden';
  ttEl.style.opacity    = '1';
  ttEl.style.left = '-9999px';
  ttEl.style.top  = '-9999px';

  /* read actual rendered size */
  const tw = ttEl.offsetWidth  || 210;
  const th = ttEl.offsetHeight || 120;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const pad = 12;

  /* prefer right-of-cursor; flip left if it would overflow */
  let x = ev.clientX + 16;
  if (x + tw + pad > vw) x = ev.clientX - tw - 16;
  x = Math.max(pad, Math.min(x, vw - tw - pad));

  /* prefer above cursor; flip below if it would overflow top */
  let y = ev.clientY - th - 10;
  if (y < pad) y = ev.clientY + 18;
  y = Math.max(pad, Math.min(y, vh - th - pad));

  ttEl.style.left       = x + 'px';
  ttEl.style.top        = y + 'px';
  ttEl.style.visibility = 'visible';
}
function hideTT() { ttEl.style.opacity='0'; ttEl.style.visibility='hidden'; }

function render() {
  const rows   = DATA[country][selectedYear];
  const cats   = CATS.filter(c => visible.has(c.key));
  const totals = rows.map(r => cats.reduce((s,c) => s+r[c.key], 0));
  updateStats(rows, totals);

  const svgEl = document.getElementById('chart-svg');
  const wrap  = svgEl.parentElement;
  const W     = wrap.clientWidth  || 600;
  const H     = wrap.clientHeight || 280;
  const m     = { top:44, right:22, bottom:46, left:56 };
  const iW    = W - m.left - m.right;
  const iH    = H - m.top  - m.bottom;

  svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svgEl.setAttribute('width',  W);
  svgEl.setAttribute('height', H);

  const svg = d3.select(svgEl);
  svg.selectAll('*').remove();

  const g = svg.append('g').attr('transform',`translate(${m.left},${m.top})`);

  const xSc = d3.scaleBand().domain(rows.map(r=>r.season)).range([0,iW]).padding(0.3);
  const yMax = Math.max(...totals)*1.22;
  const ySc  = d3.scaleLinear().domain([0,yMax]).nice().range([iH,0]);

  g.append('g').attr('class','grid')
   .call(d3.axisLeft(ySc).ticks(5).tickSize(-iW).tickFormat(''))
   .call(gx=>gx.select('.domain').remove());

  g.append('g').attr('transform',`translate(0,${iH})`)
   .call(d3.axisBottom(xSc).tickSize(0))
   .call(ax=>ax.select('.domain'))
   .selectAll('text')
     .attr('dy','1.3em')
     .style('font-family',"'JetBrains Mono',monospace")
     .style('font-size','12px')
     .style('fill','#ffffff')
     .style('font-weight','600');

  g.append('g')
   .call(d3.axisLeft(ySc).ticks(5).tickFormat(d=>d>=1000?(d/1000)+'k':d))
   .call(ay=>ay.select('.domain').remove())
   .selectAll('text')
     .style('font-size','11px')
     .style('font-family',"'JetBrains Mono',monospace")
     .style('fill','#c8ddf0')
     .style('font-weight','500');

  g.append('text').attr('class','axis-lbl')
   .attr('transform','rotate(-90)').attr('x',-iH/2).attr('y',-42)
   .attr('text-anchor','middle').text('Average PM10 (µg/m³)');

  g.append('text').attr('class','axis-lbl')
   .attr('x',iW/2).attr('y',iH+40)
   .attr('text-anchor','middle').text('Season');

  const stack   = d3.stack().keys(cats.map(c=>c.key));
  const stacked = stack(rows);

  g.selectAll('.sg').data(stacked).join('g')
   .attr('class','sg').attr('fill',(_,i)=>cats[i].color)
   .selectAll('rect')
   .data(d=>d.map(v=>({...v,key:d.key})))
   .join('rect')
   .attr('class','bar-segment')
   .attr('x',      d=>xSc(d.data.season))
   .attr('width',  xSc.bandwidth())
   .attr('y',      d=>ySc(d[1]))
   .attr('height', d=>Math.max(0,ySc(d[0])-ySc(d[1])))
   .on('mousemove',(ev,d)=>{
     const cat  = CATS.find(c=>c.key===d.key);
     const val  = d[1]-d[0];
     const tot  = totals[rows.findIndex(r=>r.season===d.data.season)];
     const pct  = ((val/tot)*100).toFixed(1);
     showTT(ev,`<strong>${d.data.season}</strong>
       <div class="tt-row"><span><span class="tt-swatch" style="background:${cat.color}"></span>${cat.label}</span><span>${val} µg/m³</span></div>
       <div class="tt-row"><span>Share</span><span>${pct}%</span></div>
       <div class="tt-divider"></div>
       <div class="tt-row"><span>Season total</span><span>${tot} µg/m³</span></div>`);
   })
   .on('mouseleave', hideTT);

  const topData = rows.map((r,i)=>({season:r.season,total:totals[i],y:ySc(totals[i]),x:xSc(r.season),w:xSc.bandwidth()}));

  g.selectAll('.bar-cap').data(topData).join('rect').attr('class','bar-cap')
   .attr('x',d=>d.x).attr('y',d=>d.y).attr('width',d=>d.w).attr('height',5)
   .attr('rx',3).attr('fill',cats[cats.length-1].color);

  g.selectAll('.bar-total').data(topData).join('text').attr('class','bar-total')
   .attr('x',d=>d.x+d.w/2).attr('y',d=>d.y-8)
   .attr('text-anchor','middle').text(d=>d.total);

  stacked.forEach(layer=>layer.forEach(d=>{
    const h=ySc(d[0])-ySc(d[1]);
    if(h>24) g.append('text').attr('class','seg-lbl')
      .attr('x',xSc(d.data.season)+xSc.bandwidth()/2)
      .attr('y',(ySc(d[0])+ySc(d[1]))/2+4)
      .attr('text-anchor','middle').text(d[1]-d[0]);
  }));

  const maxIdx=totals.indexOf(Math.max(...totals));
  const mr=topData[maxIdx];
  const annX=mr.x+mr.w/2, annY=mr.y-32;
  const bw='peak season'.length*6.2+18;
  g.append('line').attr('class','ann-line').attr('x1',annX).attr('y1',annY+4).attr('x2',annX).attr('y2',mr.y-12);
  g.append('rect').attr('class','ann-bg').attr('x',annX-bw/2).attr('y',annY-14).attr('width',bw).attr('height',17).attr('rx',4);
  g.append('text').attr('class','ann-txt').attr('x',annX).attr('y',annY-1).attr('text-anchor','middle').text('peak season');

  if(country==='India'){
    const whoY=ySc(150), lw=168;
    g.append('line').attr('class','who-line').attr('x1',0).attr('y1',whoY).attr('x2',iW).attr('y2',whoY);
    g.append('rect').attr('class','who-bg').attr('x',iW-lw-3).attr('y',whoY-14).attr('width',lw).attr('height',12).attr('rx',3);
    g.append('text').attr('class','who-txt').attr('x',iW-lw/2-3).attr('y',whoY-5).attr('text-anchor','middle').text('WHO interim target: 150 µg/m³');
  }
}

buildYearPanel(); buildChips(); buildLegend(); render();
window.addEventListener('resize', render);
</script>

</body>
</html>
